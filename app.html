<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Документ приложения во фрейме; прокрутка вкладки Safari — у родительского index.html (postMessage + min-height). -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Тест</title>
  <style>
    :root {
      --isl-vh: 1%;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: system-ui, sans-serif;
      background: #1a1a1e;
      color: #eee;
    }

    html.isl-locked,
    html.isl-locked body {
      overflow: hidden;
      position: relative;
      height: 100dvh;
      overscroll-behavior: none;
    }

    #app-root {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100dvh;
    }

    .isl-app-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: min(100%, 360px);
    }

    .isl-app-stack video {
      width: 100%;
      max-height: 40vh;
      border-radius: 10px;
      background: #000;
    }

    button {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }

    /* iOS Safari: скрытие нижней панели вкладок (техника Playgama) */
    .isl-holder {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: min(calc(var(--isl-vh) * 100), 100%);
      overflow: hidden;
      z-index: 2147483646;
      display: none;
    }

    html.isl-locked .isl-holder {
      display: block;
    }

    .isl-scroller {
      display: block;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .isl-scroller::-webkit-scrollbar {
      display: none;
    }

    .isl-scroller-inner {
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      flex-direction: column;
      height: calc(100% + 1px);
      min-height: calc(100% + 1px);
    }

    #isl-content {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: sticky;
      width: 100%;
      height: calc(100% - 1px);
      top: 0;
      bottom: 0;
    }

    .isl-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 12px env(safe-area-inset-right) 0 env(safe-area-inset-left);
      z-index: 2147483647;
      pointer-events: none;
    }

    .isl-overlay.isl-visible {
      display: flex;
    }

    .isl-bubble {
      max-width: 80vw;
      backdrop-filter: blur(8px);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      border-radius: 96px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.35;
      pointer-events: auto;
    }

    .isl-embed-note:not([hidden]) {
      display: block;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 12px;
      opacity: 0.92;
    }

    .isl-spacer {
      display: none;
      width: 1px;
      height: 2000vh;
    }

    .isl-spacer.isl-visible {
      display: block;
    }

    /*
      iOS Safari: верхняя панель адреса чаще реагирует на прокрутку документа (window),
      а не на overflow внутри fixed. Короткий «мост» + временный overflow даёт
      реальный scrollHeight и программальный сдвиг в том же user gesture.
    */
    .isl-top-chrome-bridge {
      display: none;
      width: 1px;
      height: 1px;
      margin-top: calc(100dvh + 48px);
      pointer-events: none;
      visibility: hidden;
    }

    .isl-top-chrome-bridge.isl-visible {
      display: block;
    }

    html.isl-locked.isl-page-nudge,
    html.isl-locked.isl-page-nudge body {
      overflow-x: hidden !important;
      overflow-y: auto !important;
      height: auto !important;
      min-height: 100dvh !important;
    }

    /* Вне secure context (file://, http без localhost) Fullscreen API недоступен — запасной режим на весь видимый таб */
    html.immersive-fallback {
      overflow: hidden !important;
    }

    html.immersive-fallback body {
      overflow: hidden !important;
    }

    html.immersive-fallback #app-root {
      position: fixed;
      inset: 0;
      z-index: 2147483000;
      box-sizing: border-box;
      width: 100vw !important;
      height: 100vh !important;
      min-height: 100vh !important;
      margin: 0;
      background: #1a1a1e;
    }
  </style>
</head>
<body>
  <main id="app-root">
    <div class="isl-app-stack">
      <button type="button" id="action">Полный экран</button>
      <!-- iOS Safari: нативный полноэкран для видео — webkitEnterFullscreen (см. main.js); playsinline нужен для воспроизведения в странице до входа в FS -->
      <video
        id="isl-demo-video"
        playsinline
        controls
        preload="metadata"
        width="320"
      >
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4" />
      </video>
    </div>
  </main>

  <div class="isl-holder" aria-hidden="true">
    <div class="isl-scroller">
      <div class="isl-scroller-inner">
        <div id="isl-content"></div>
      </div>
    </div>
  </div>

  <div class="isl-overlay" role="status">
    <div class="isl-bubble">
      Прокрутите вниз или нажмите «Полный экран» ещё раз — так Safari убирает и нижние вкладки, и верхнюю строку адреса
      <span class="isl-embed-note" hidden></span>
    </div>
  </div>

  <div class="isl-spacer" aria-hidden="true"></div>

  <div id="isl-top-chrome-bridge" class="isl-top-chrome-bridge" aria-hidden="true"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
